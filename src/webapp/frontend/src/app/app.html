@if (isLoggedIn()) {
  <mat-toolbar color="primary">
    <a routerLink="/video-summary" class="app-title"
      >Shoppable Video Accelerator</a
    >

    <div class="top-nav-links">
      <a
        mat-button
        routerLink="/video-summary"
        routerLinkActive="active-nav-btn"
      >
        <mat-icon>video_library</mat-icon>
        <span>Videos</span>
      </a>
      <a mat-button routerLink="/push-status" routerLinkActive="active-nav-btn">
        <mat-icon>cloud_upload</mat-icon>
        <span>Ads Push Status</span>
      </a>
    </div>

    <span class="toolbar-spacer"></span>
    @if (accessibleCustomers().length > 0) {
      <div class="account-selector-container">
        <div class="context-switcher">
          <mat-icon class="context-icon">domain</mat-icon>
          <select
            class="context-select"
            [value]="activeAccount()"
            (change)="onAccountChange($any($event.target).value)"
            [title]="
              !hasPlatformAccount()
                ? 'Please select a platform-relevant account'
                : 'Active Account'
            "
          >
            @for (
              customer of accessibleCustomers();
              track customer.customer_id
            ) {
              <option [value]="customer.customer_id">
                {{ customer.descriptive_name }} ({{ customer.customer_id }})
              </option>
            }
          </select>
        </div>
      </div>
    }
    @if (isLoggedIn(); as user) {
      <div class="user-profile-container">
        @if (user.picture) {
          <img
            [src]="user.picture"
            alt="Profile"
            class="profile-pic"
            [title]="user.name || 'Profile'"
            referrerpolicy="no-referrer"
          />
        } @else {
          <mat-icon class="profile-fallback" [title]="user.name || 'Profile'"
            >account_circle</mat-icon
          >
        }
        <button
          mat-icon-button
          (click)="logout()"
          title="Logout"
          class="logout-btn"
        >
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    }
  </mat-toolbar>

  <div class="main-content">
    <router-outlet></router-outlet>
  </div>
} @else {
  <router-outlet></router-outlet>
}
